<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results — RR LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar-rr" id="sidebarMount"></aside>

    <div class="main-content">
      <header class="content-topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="sidebar-toggle-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
          <span class="page-heading">My Results</span>
        </div>
      </header>

      <div class="content-body">
        <div class="card-rr p-0">
          <table class="table mb-0">
            <thead>
              <tr>
                <th class="ps-3">Quiz</th>
                <th>Course</th>
                <th>Score</th>
                <th>Percentage</th>
                <th class="pe-3">Date</th>
              </tr>
            </thead>
            <tbody id="resultsTableBody"></tbody>
          </table>
        </div>
        <div id="resultsEmptyState"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const user = requireAuth(["student"]);
      if (!user) return;
      renderSidebar("results.html");

      try {
        const res = await api.quiz.results();
        const results = res.data;
        const tbody = document.getElementById("resultsTableBody");

        if (!results.length) {
          document.getElementById("resultsEmptyState").innerHTML =
            `<div class="empty-state"><div class="empty-icon"><i class="bi bi-bar-chart"></i></div><p>No quiz results yet. Take a quiz to see your progress here.</p></div>`;
          return;
        }

        tbody.innerHTML = results
          .map((r) => {
            const pct = r.total ? Math.round((r.score / r.total) * 100) : 0;
            const pillClass = pct >= 70 ? "pill-success" : pct >= 40 ? "pill-warning" : "pill-danger";
            return `
            <tr>
              <td class="ps-3">${escapeHtml(r.quiz_title)}</td>
              <td>${escapeHtml(r.course_title)}</td>
              <td>${r.score} / ${r.total}</td>
              <td><span class="pill-rr ${pillClass}">${pct}%</span></td>
              <td class="pe-3">${formatDate(r.taken_at)}</td>
            </tr>`;
          })
          .join("");
      } catch (err) {
        showToast(err.message || "Could not load results", "error");
      }
    });
  </script>
</body>
</html>
