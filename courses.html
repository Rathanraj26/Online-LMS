<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses — RR LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/courses.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar-rr" id="sidebarMount"></aside>

    <div class="main-content">
      <header class="content-topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="sidebar-toggle-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
          <span class="page-heading" id="pageHeadingText">Browse Courses</span>
        </div>
        <button class="btn-rr btn-primary-rr btn-sm-rr d-none" id="newCourseBtn" data-bs-toggle="modal" data-bs-target="#createCourseModal">
          <i class="bi bi-plus-lg"></i> New Course
        </button>
      </header>

      <div class="content-body">
        <div class="catalog-toolbar" id="studentToolbar">
          <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="searchInput" class="form-control-rr" placeholder="Search courses by title or topic..." onkeyup="if(event.key==='Enter') searchCourses()">
          </div>
          <button class="btn-rr btn-outline-rr" onclick="searchCourses()">Search</button>
        </div>

        <div class="catalog-grid" id="catalogGrid"></div>
      </div>
    </div>
  </div>

  <!-- Create Course Modal (instructor) -->
  <div class="modal fade" id="createCourseModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form onsubmit="handleCreateCourse(event)" enctype="multipart/form-data">
          <div class="modal-header">
            <h5 class="modal-title">Create a New Course</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="form-group mb-3">
              <label class="form-label-rr">Title</label>
              <input type="text" name="title" class="form-control-rr" required>
            </div>
            <div class="form-group mb-3">
              <label class="form-label-rr">Description</label>
              <textarea name="description" class="form-control-rr" rows="3" required></textarea>
            </div>
            <div class="form-group mb-3">
              <label class="form-label-rr">Category</label>
              <input type="text" name="category" class="form-control-rr" placeholder="e.g. Web Development">
            </div>
            <div class="form-group mb-3">
              <label class="form-label-rr">Price ($)</label>
              <input type="number" name="price" min="0" step="0.01" class="form-control-rr" value="0">
            </div>
            <div class="form-group">
              <label class="form-label-rr">Thumbnail Image</label>
              <input type="file" name="thumbnail" accept="image/*" class="form-control-rr">
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn-rr btn-primary-rr">Create Course</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/courses.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = requireAuth([]);
      if (!user) return;
      renderSidebar("courses.html");

      if (user.role === "instructor") {
        document.getElementById("pageHeadingText").textContent = "My Courses";
        document.getElementById("newCourseBtn").classList.remove("d-none");
        document.getElementById("studentToolbar").classList.add("d-none");
      }
      loadCourseCatalog();
    });
  </script>
</body>
</html>
