<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — RR LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .avatar-lg {
      width: 92px; height: 92px; border-radius: 50%;
      background: var(--brand); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 700; overflow: hidden;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar-rr" id="sidebarMount"></aside>

    <div class="main-content">
      <header class="content-topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="sidebar-toggle-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
          <span class="page-heading">My Profile</span>
        </div>
      </header>

      <div class="content-body">
        <div class="card-rr p-4" style="max-width:640px;">
          <div class="d-flex align-items-center gap-3 mb-4">
            <div class="avatar-lg" id="profileAvatarPreview"></div>
            <div>
              <span class="pill-rr pill-brand" id="profileRoleBadge">student</span>
            </div>
          </div>

          <form id="profileForm" enctype="multipart/form-data">
            <div class="form-group mb-3">
              <label class="form-label-rr">Full Name</label>
              <input type="text" name="name" id="profileName" class="form-control-rr" required>
            </div>
            <div class="form-group mb-3">
              <label class="form-label-rr">Email (read-only)</label>
              <input type="email" id="profileEmail" class="form-control-rr" disabled>
            </div>
            <div class="form-group mb-3">
              <label class="form-label-rr">Phone</label>
              <input type="text" name="phone" id="profilePhone" class="form-control-rr">
            </div>
            <div class="form-group mb-3">
              <label class="form-label-rr">Bio</label>
              <textarea name="bio" id="profileBio" class="form-control-rr" rows="3"></textarea>
            </div>
            <div class="form-group mb-4">
              <label class="form-label-rr">Update Avatar</label>
              <input type="file" id="avatarInput" accept="image/*" class="form-control-rr">
            </div>
            <button type="submit" class="btn-rr btn-primary-rr">Save Changes</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/profile.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", initProfilePage);
  </script>
</body>
</html>
