<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — RR LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="auth-shell">
    <div class="auth-visual">
      <div class="auth-brand"><span class="brand-badge">RR</span> RR Learning</div>
      <p class="auth-quote">"The beautiful thing about learning is that no one can take it away from you."</p>
      <span class="auth-footnote">— B.B. King</span>
    </div>

    <div class="auth-form-side">
      <div class="auth-form-card">
        <h1>Welcome back</h1>
        <p class="auth-sub">Log in to continue your learning journey.</p>

        <form onsubmit="handleLogin(event)" novalidate>
          <div class="form-group">
            <label class="form-label-rr">Email address</label>
            <input type="email" name="email" class="form-control-rr" placeholder="you@example.com" required>
            <div class="field-error"></div>
          </div>
          <div class="form-group">
            <label class="form-label-rr">Password</label>
            <input type="password" name="password" class="form-control-rr" placeholder="••••••••" required>
            <div class="field-error"></div>
          </div>
          <button type="submit" class="btn-rr btn-primary-rr btn-block-rr mt-2">Sign In</button>
        </form>

        <div class="auth-switch-link">
          Don't have an account? <a href="register.html">Create one</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
