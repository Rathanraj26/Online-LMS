<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificates — RR LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .certificate-frame {
      background: var(--paper-0);
      border: 2px solid var(--accent);
      border-radius: var(--radius-lg);
      padding: 56px 40px;
      text-align: center;
      position: relative;
      max-width: 720px;
      margin: 0 auto;
    }
    .certificate-frame::before {
      content: "";
      position: absolute; inset: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      pointer-events: none;
    }
    .certificate-frame .cert-seal {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; margin: 0 auto 18px;
    }
    .certificate-frame .cert-name { font-family: var(--font-display); font-size: 2rem; margin: 14px 0; color: var(--ink-900); }
    .certificate-frame .cert-course { font-family: var(--font-display); font-size: 1.3rem; color: var(--brand); margin-bottom: 18px; }
    .certificate-frame .cert-meta { font-size: 0.82rem; color: var(--ink-600); margin-top: 24px; }
  </style>
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar-rr" id="sidebarMount"></aside>

    <div class="main-content">
      <header class="content-topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="sidebar-toggle-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
          <span class="page-heading">Certificates</span>
        </div>
      </header>

      <div class="content-body">
        <div class="mb-4" style="max-width:360px;">
          <label class="form-label-rr">Select a completed course</label>
          <select id="courseSelector" class="form-control-rr" onchange="loadCertificateFor(this.value)"></select>
        </div>

        <div id="certificateArea">
          <div class="empty-state">
            <div class="empty-icon"><i class="bi bi-award"></i></div>
            <p>Select a course above to view or generate your certificate.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const user = requireAuth(["student"]);
      if (!user) return;
      renderSidebar("certificate.html");

      try {
        const res = await api.enrollment.myCourses();
        const selector = document.getElementById("courseSelector");
        selector.innerHTML =
          `<option value="">Choose a course...</option>` +
          res.data.map((c) => `<option value="${c.id}">${escapeHtml(c.title)}</option>`).join("");
      } catch (err) {
        showToast(err.message || "Could not load your courses", "error");
      }
    });

    async function loadCertificateFor(courseId) {
      const area = document.getElementById("certificateArea");
      if (!courseId) return;
      const user = getCurrentUser();

      area.innerHTML = `<div class="empty-state">Checking your progress...</div>`;

      try {
        const progressRes = await api.progress.get(courseId);
        const { percentage } = progressRes.data;

        if (percentage < 100) {
          area.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon"><i class="bi bi-hourglass-split"></i></div>
              <p>You're ${percentage}% through this course. Complete all lessons to unlock your certificate.</p>
            </div>`;
          return;
        }

        let cert;
        try {
          const res = await api.certificate.get(courseId);
          cert = res.data;
        } catch (_) {
          const genRes = await api.certificate.generate(courseId);
          cert = genRes.data;
        }

        renderCertificate(cert, user);
      } catch (err) {
        area.innerHTML = `<div class="empty-state">${escapeHtml(err.message)}</div>`;
      }
    }

    function renderCertificate(cert, user) {
      const area = document.getElementById("certificateArea");
      area.innerHTML = `
        <div class="certificate-frame">
          <div class="cert-seal"><i class="bi bi-award-fill"></i></div>
          <div class="text-muted-rr" style="letter-spacing:0.08em; text-transform:uppercase; font-size:0.8rem;">Certificate of Completion</div>
          <div class="cert-name">${escapeHtml(cert.student_name || user.name)}</div>
          <p class="text-muted-rr mb-0">has successfully completed the course</p>
          <div class="cert-course">${escapeHtml(cert.course_title || "")}</div>
          <div class="cert-meta">
            Certificate No. ${escapeHtml(cert.certificate_no)} &nbsp;·&nbsp; Issued ${formatDate(cert.date)}
          </div>
        </div>
        <div class="text-center mt-4">
          <button class="btn-rr btn-primary-rr" onclick="window.print()"><i class="bi bi-download"></i> Download / Print</button>
        </div>`;
    }
  </script>
</body>
</html>
