<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning — RR LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/courses.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar-rr" id="sidebarMount"></aside>

    <div class="main-content">
      <header class="content-topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="sidebar-toggle-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
          <span class="page-heading" id="learningCourseTitle">Course</span>
        </div>
        <div class="d-flex align-items-center gap-2" style="width:180px;">
          <div class="progress-rr flex-grow-1"><div class="progress-fill" id="courseProgressFill" style="width:0%"></div></div>
          <small class="text-muted-rr" id="courseProgressLabel">0%</small>
        </div>
      </header>

      <div class="content-body">
        <div class="learning-shell">
          <div>
            <div class="video-frame mb-3" id="videoFrame"><i class="bi bi-film"></i></div>
            <div class="d-flex justify-content-between align-items-center">
              <h2 class="h5 mb-0" id="nowPlayingTitle">Select a lesson</h2>
              <button class="btn-rr btn-accent-rr btn-sm-rr" onclick="markCurrentLessonComplete()">
                <i class="bi bi-check-lg"></i> Mark Complete
              </button>
            </div>
          </div>

          <div class="card-rr p-3">
            <h3 class="h6 mb-3">Course Content</h3>
            <div class="lesson-playlist" id="lessonPlaylist"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/courses.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const user = requireAuth(["student"]);
      if (!user) return;
      renderSidebar("courses.html");
      loadLearningPlayer();
    });
  </script>
</body>
</html>
