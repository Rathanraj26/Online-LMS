<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — RR LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar-rr" id="sidebarMount"></aside>

    <div class="main-content">
      <header class="content-topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="sidebar-toggle-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
          <span class="page-heading">Dashboard</span>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="text-muted-rr" style="font-size:0.88rem;">Welcome back, <strong data-user-name></strong></span>
        </div>
      </header>

      <div class="content-body">
        <div class="section-title" id="greetingTitle">Here's your overview</div>
        <p class="section-sub" id="greetingSub">A quick snapshot of your learning activity.</p>

        <div class="row g-3 mb-4" id="statsRow"></div>

        <div id="dashboardMainArea"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/courses.js"></script>
  <script>
    async function initDashboard() {
      const user = requireAuth([]);
      if (!user) return;
      renderSidebar("dashboard.html");

      if (user.role === "student") await loadStudentDashboard();
      else if (user.role === "instructor") await loadInstructorDashboard();
      else await loadAdminDashboard();
    }

    function statCard(icon, value, label) {
      return `
        <div class="col-6 col-md-3">
          <div class="stat-card">
            <div class="stat-icon"><i class="bi ${icon}"></i></div>
            <div>
              <div class="stat-value">${value}</div>
              <div class="stat-label">${label}</div>
            </div>
          </div>
        </div>`;
    }

    async function loadStudentDashboard() {
      document.getElementById("greetingTitle").textContent = "Keep the momentum going";
      const statsRow = document.getElementById("statsRow");
      const mainArea = document.getElementById("dashboardMainArea");

      try {
        const [coursesRes, resultsRes] = await Promise.all([
          api.enrollment.myCourses(),
          api.quiz.results().catch(() => ({ data: [] })),
        ]);
        const courses = coursesRes.data;
        const results = resultsRes.data;
        const avgScore = results.length
          ? Math.round((results.reduce((s, r) => s + (r.score / (r.total || 1)), 0) / results.length) * 100)
          : 0;

        statsRow.innerHTML =
          statCard("bi-collection-play-fill", courses.length, "Enrolled Courses") +
          statCard("bi-patch-question-fill", results.length, "Quizzes Taken") +
          statCard("bi-graph-up-arrow", avgScore + "%", "Average Score") +
          statCard("bi-award-fill", "—", "Certificates");

        mainArea.innerHTML = `
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 mb-0">Continue Learning</h2>
            <a href="courses.html" class="btn-rr btn-outline-rr btn-sm-rr">Browse More</a>
          </div>
          <div class="catalog-grid" id="myCoursesGrid"></div>`;

        renderCourseGrid(courses.slice(0, 6), document.getElementById("myCoursesGrid"), user_placeholder());
      } catch (err) {
        mainArea.innerHTML = `<div class="empty-state">${escapeHtml(err.message)}</div>`;
      }
    }
    function user_placeholder() { return getCurrentUser(); }

    async function loadInstructorDashboard() {
      document.getElementById("greetingTitle").textContent = "Your teaching overview";
      const statsRow = document.getElementById("statsRow");
      const mainArea = document.getElementById("dashboardMainArea");

      try {
        const res = await api.courses.myCourses();
        const courses = res.data;
        const totalStudents = courses.reduce((s, c) => s + (c.enrolled_count || 0), 0);

        statsRow.innerHTML =
          statCard("bi-collection-play-fill", courses.length, "My Courses") +
          statCard("bi-people-fill", totalStudents, "Total Students") +
          statCard("bi-journal-check", "—", "Assignments") +
          statCard("bi-patch-question-fill", "—", "Quizzes");

        mainArea.innerHTML = `
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h5 mb-0">My Courses</h2>
            <a href="courses.html" class="btn-rr btn-primary-rr btn-sm-rr"><i class="bi bi-plus-lg"></i> New Course</a>
          </div>
          <div class="catalog-grid" id="myCoursesGrid"></div>`;
        renderCourseGrid(courses, document.getElementById("myCoursesGrid"), getCurrentUser());
      } catch (err) {
        mainArea.innerHTML = `<div class="empty-state">${escapeHtml(err.message)}</div>`;
      }
    }

    async function loadAdminDashboard() {
      document.getElementById("greetingTitle").textContent = "System overview";
      const statsRow = document.getElementById("statsRow");
      const mainArea = document.getElementById("dashboardMainArea");

      try {
        const [usersRes, coursesRes] = await Promise.all([
          api.users.all(),
          api.courses.all(),
        ]);
        const users = usersRes.data;
        const students = users.filter((u) => u.role === "student").length;
        const instructors = users.filter((u) => u.role === "instructor").length;

        statsRow.innerHTML =
          statCard("bi-people-fill", users.length, "Total Users") +
          statCard("bi-mortarboard-fill", students, "Students") +
          statCard("bi-easel-fill", instructors, "Instructors") +
          statCard("bi-collection-play-fill", coursesRes.data.length, "Courses");

        mainArea.innerHTML = `
          <h2 class="h5 mb-3">Recent Users</h2>
          <div class="card-rr p-0">
            <table class="table mb-0">
              <thead><tr><th class="ps-3">Name</th><th>Email</th><th>Role</th><th>Status</th><th class="pe-3">Action</th></tr></thead>
              <tbody id="usersTableBody"></tbody>
            </table>
          </div>`;

        document.getElementById("usersTableBody").innerHTML = users
          .slice(0, 12)
          .map(
            (u) => `
          <tr>
            <td class="ps-3">${escapeHtml(u.name)}</td>
            <td>${escapeHtml(u.email)}</td>
            <td><span class="pill-rr pill-brand">${u.role}</span></td>
            <td><span class="pill-rr ${u.is_active ? "pill-success" : "pill-danger"}">${u.is_active ? "Active" : "Disabled"}</span></td>
            <td class="pe-3">
              <button class="btn-rr btn-outline-rr btn-sm-rr" onclick="toggleUser(${u.id}, ${u.is_active ? 0 : 1})">
                ${u.is_active ? "Disable" : "Enable"}
              </button>
            </td>
          </tr>`
          )
          .join("");
      } catch (err) {
        mainArea.innerHTML = `<div class="empty-state">${escapeHtml(err.message)}</div>`;
      }
    }

    async function toggleUser(id, newStatus) {
      try {
        await api.users.setStatus(id, !!newStatus);
        showToast("User status updated", "success");
        loadAdminDashboard();
      } catch (err) {
        showToast(err.message || "Could not update user", "error");
      }
    }

    document.addEventListener("DOMContentLoaded", initDashboard);
  </script>
</body>
</html>
