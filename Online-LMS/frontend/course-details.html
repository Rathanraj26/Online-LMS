<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Details — RR LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/courses.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar-rr" id="sidebarMount"></aside>

    <div class="main-content">
      <header class="content-topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="sidebar-toggle-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
          <span class="page-heading">Course Details</span>
        </div>
        <a href="courses.html" class="btn-rr btn-outline-rr btn-sm-rr"><i class="bi bi-arrow-left"></i> Back to Courses</a>
      </header>

      <div class="content-body" id="courseDetailContainer">
        <div class="course-hero">
          <div class="course-hero-category" id="courseHeroCategory">Category</div>
          <h1 id="courseHeroTitle">Loading course...</h1>
          <p id="courseHeroDesc"></p>
          <div class="instructor-chip">
            <span class="avatar-sm" id="instructorInitials"></span>
            <span id="instructorName" style="color:#fff;"></span>
          </div>
          <div class="mt-3" id="courseActionArea"></div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2 class="h5 mb-0">Course Curriculum</h2>
          <button type="button" class="btn-rr btn-primary-rr btn-sm-rr d-none" id="addLessonBtn" data-bs-toggle="modal" data-bs-target="#addLessonModal">
            <i class="bi bi-plus-lg"></i> Add Module / Lesson
          </button>
        </div>
        <div class="curriculum-list" id="curriculumList"></div>
      </div>
    </div>
  </div>

  <!-- Add Lesson / Module (instructor) -->
  <div class="modal fade" id="addLessonModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="addLessonForm" onsubmit="handleAddLesson(event)" enctype="multipart/form-data">
          <div class="modal-header">
            <h5 class="modal-title">Add Module / Lesson</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="form-group mb-3">
              <label class="form-label-rr">Lesson / Module Title</label>
              <input type="text" name="title" class="form-control-rr" placeholder="e.g. Module 6: Testing & QA" required>
            </div>
            <div class="form-group mb-3">
              <label class="form-label-rr">Type</label>
              <select name="type" id="lessonTypeSelect" class="form-control-rr" onchange="toggleLessonFileHint()">
                <option value="video">Video — Upload File</option>
                <option value="youtube">Video — YouTube Link</option>
                <option value="pdf">PDF / Notes</option>
                <option value="link">External Link (no file)</option>
              </select>
            </div>
            <div class="form-group mb-3" id="lessonFileGroup">
              <label class="form-label-rr">Upload File</label>
              <input type="file" name="file" id="lessonFileInput" class="form-control-rr">
              <small class="text-muted-rr" id="lessonFileHint">Accepted: mp4, mov, avi, mkv, webm</small>
            </div>
            <div class="form-group mb-3 d-none" id="lessonUrlGroup">
              <label class="form-label-rr" id="lessonUrlLabel">YouTube URL</label>
              <input type="url" name="video_url" id="lessonUrlInput" class="form-control-rr" placeholder="https://www.youtube.com/watch?v=...">
            </div>
            <div class="row g-2">
              <div class="col-6">
                <label class="form-label-rr">Duration (minutes)</label>
                <input type="number" name="duration_min" class="form-control-rr" min="0" value="0">
              </div>
              <div class="col-6">
                <label class="form-label-rr">Position / Order</label>
                <input type="number" name="position" class="form-control-rr" min="0" value="0">
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn-rr btn-primary-rr">Add to Curriculum</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/courses.js"></script>
  <script>
    let viewedCourseId = null;

    document.addEventListener("DOMContentLoaded", () => {
      toggleLessonFileHint();
      const user = requireAuth([]);
      if (!user) return;
      renderSidebar("courses.html");

      viewedCourseId = new URLSearchParams(location.search).get("id");
      loadCourseDetails().then(() => {
        // Show the "Add Lesson" button only for the owning instructor or an admin
        const isOwner = currentCourseDetail && currentCourseDetail.instructor_id === user.id;
        if (user.role === "admin" || (user.role === "instructor" && isOwner)) {
          document.getElementById("addLessonBtn").classList.remove("d-none");
        }
      });
    });

    function toggleLessonFileHint() {
      const type = document.getElementById("lessonTypeSelect").value;
      const fileGroup = document.getElementById("lessonFileGroup");
      const fileHint = document.getElementById("lessonFileHint");
      const fileInput = document.getElementById("lessonFileInput");
      const urlGroup = document.getElementById("lessonUrlGroup");
      const urlLabel = document.getElementById("lessonUrlLabel");
      const urlInput = document.getElementById("lessonUrlInput");

      if (type === "youtube" || type === "link") {
        fileGroup.classList.add("d-none");
        fileInput.required = false;
        fileInput.value = "";

        urlGroup.classList.remove("d-none");
        urlLabel.textContent = type === "youtube" ? "YouTube URL" : "Link URL";
        urlInput.placeholder = type === "youtube"
          ? "https://www.youtube.com/watch?v=..."
          : "https://example.com/resource";
        urlInput.required = true;
      } else {
        urlGroup.classList.add("d-none");
        urlInput.required = false;
        urlInput.value = "";

        fileGroup.classList.remove("d-none");
        fileHint.textContent = type === "video"
          ? "Accepted: mp4, mov, avi, mkv, webm"
          : "Accepted: pdf, doc, docx, ppt, pptx, txt, zip";
      }
    }
  </script>
</body>
</html>
