<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignments — RR LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar-rr" id="sidebarMount"></aside>

    <div class="main-content">
      <header class="content-topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="sidebar-toggle-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
          <span class="page-heading">Assignments</span>
        </div>
        <button class="btn-rr btn-primary-rr btn-sm-rr d-none" id="newAssignmentBtn" data-bs-toggle="modal" data-bs-target="#createAssignmentModal">
          <i class="bi bi-plus-lg"></i> New Assignment
        </button>
      </header>

      <div class="content-body">
        <div class="mb-4" style="max-width:360px;">
          <label class="form-label-rr">Course</label>
          <select id="courseSelector" class="form-control-rr"></select>
        </div>

        <div id="assignmentsList"></div>
      </div>
    </div>
  </div>

  <!-- Create assignment (instructor) -->
  <div class="modal fade" id="createAssignmentModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="createAssignmentForm">
          <div class="modal-header">
            <h5 class="modal-title">New Assignment</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="form-group mb-3">
              <label class="form-label-rr">Title</label>
              <input type="text" name="title" class="form-control-rr" required>
            </div>
            <div class="form-group mb-3">
              <label class="form-label-rr">Description</label>
              <textarea name="description" class="form-control-rr" rows="3"></textarea>
            </div>
            <div class="form-group mb-3">
              <label class="form-label-rr">Deadline</label>
              <input type="datetime-local" name="deadline" class="form-control-rr" required>
            </div>
            <div class="form-group">
              <label class="form-label-rr">Max Marks</label>
              <input type="number" name="max_marks" class="form-control-rr" value="100">
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn-rr btn-primary-rr">Create Assignment</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Submit assignment (student) -->
  <div class="modal fade" id="submitAssignmentModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form onsubmit="handleSubmitAssignment(event)">
          <div class="modal-header">
            <h5 class="modal-title">Submit Assignment</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <label class="form-label-rr">Upload File</label>
            <input type="file" name="file" class="form-control-rr" required>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn-rr btn-primary-rr">Submit</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Submissions / grading (instructor) -->
  <div class="modal fade" id="submissionsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="submissionsModalTitle">Submissions</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="submissionsModalBody"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/assignments.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      renderSidebar("assignments.html");
      const user = getCurrentUser();
      if (user && user.role !== "student") document.getElementById("newAssignmentBtn").classList.remove("d-none");
      initAssignmentsPage();
    });
  </script>
</body>
</html>
