<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quizzes — RR LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/quiz.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

  <div class="app-shell">
    <aside class="sidebar-rr" id="sidebarMount"></aside>

    <div class="main-content">
      <header class="content-topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="sidebar-toggle-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
          <span class="page-heading">Quizzes</span>
        </div>
        <button class="btn-rr btn-primary-rr btn-sm-rr d-none" id="newQuizBtn" data-bs-toggle="modal" data-bs-target="#createQuizModal">
          <i class="bi bi-plus-lg"></i> New Quiz
        </button>
      </header>

      <div class="content-body">

        <div id="quizListView">
          <div class="mb-4" style="max-width:360px;">
            <label class="form-label-rr">Course</label>
            <select id="courseSelector" class="form-control-rr"></select>
          </div>
          <div id="quizList"></div>
        </div>

        <div id="quizTakingView" class="d-none quiz-shell">
          <div class="quiz-header">
            <h2 class="h5 mb-0" id="activeQuizTitle"></h2>
            <span class="quiz-timer" id="quizTimer"><i class="bi bi-stopwatch"></i> 00:00</span>
          </div>
          <div class="quiz-progress-track" id="quizProgressTrack"></div>
          <div id="questionContainer"></div>
          <div class="quiz-nav-row">
            <button class="btn-rr btn-outline-rr" id="prevBtn" onclick="goToPrevQuestion()">Previous</button>
            <button class="btn-rr btn-primary-rr" id="nextBtn" onclick="goToNextQuestion()">Next</button>
          </div>
        </div>

        <div id="quizResultView" class="d-none quiz-shell"></div>
      </div>
    </div>
  </div>

  <!-- Create quiz (instructor) -->
  <div class="modal fade" id="createQuizModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="createQuizForm">
          <div class="modal-header">
            <h5 class="modal-title">New Quiz</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="form-group mb-3">
              <label class="form-label-rr">Title</label>
              <input type="text" name="title" class="form-control-rr" required>
            </div>
            <div class="form-group">
              <label class="form-label-rr">Duration (minutes)</label>
              <input type="number" name="duration_min" class="form-control-rr" value="10" min="1">
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn-rr btn-primary-rr">Create Quiz</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Add question (instructor) -->
  <div class="modal fade" id="addQuestionModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form onsubmit="handleAddQuestion(event)">
          <div class="modal-header">
            <h5 class="modal-title">Add Question</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="form-group mb-3">
              <label class="form-label-rr">Question</label>
              <textarea name="question" class="form-control-rr" rows="2" required></textarea>
            </div>
            <div class="row g-2 mb-3">
              <div class="col-6"><input type="text" name="option1" class="form-control-rr" placeholder="Option A" required></div>
              <div class="col-6"><input type="text" name="option2" class="form-control-rr" placeholder="Option B" required></div>
              <div class="col-6"><input type="text" name="option3" class="form-control-rr" placeholder="Option C"></div>
              <div class="col-6"><input type="text" name="option4" class="form-control-rr" placeholder="Option D"></div>
            </div>
            <div class="form-group">
              <label class="form-label-rr">Correct Answer (exact text)</label>
              <input type="text" name="correctAnswer" class="form-control-rr" required>
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn-rr btn-primary-rr">Add Question</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/quiz.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      renderSidebar("quiz.html");
      const user = getCurrentUser();
      if (user && user.role !== "student") document.getElementById("newQuizBtn").classList.remove("d-none");
      initQuizPage();
    });
  </script>
</body>
</html>
